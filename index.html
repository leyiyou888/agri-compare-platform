<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>农业区位因素模拟平台 | 专业土壤细分 + 水源因素</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #eaf7e1 0%, #c8e6c9 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
            color: #1e3c2c;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1f5e3a, #3b8c4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.05);
        }

        .simulation-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .factors-area {
            flex: 1;
            min-width: 320px;
            background: rgba(255, 255, 245, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 20px 24px;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.2);
            border: 1px solid #d9e6b3;
        }

        .result-area {
            flex: 2;
            min-width: 320px;
            background: #2d4a2cdf;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 24px 20px;
            color: #f9f7e1;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.3);
            border: 1px solid #b7d968;
        }

        .factor-category {
            background: #fefcf0;
            border-radius: 1.5rem;
            padding: 12px 18px;
            margin-bottom: 28px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #6fbf4c;
        }

        .factor-category h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            margin-bottom: 16px;
            color: #2a6b3c;
            border-bottom: 2px dashed #cfe6b5;
            padding-bottom: 6px;
        }

        .factor-group {
            margin-bottom: 20px;
        }

        .factor-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            font-size: 1rem;
            color: #2a5c3a;
            background: #e9f3e0;
            padding: 4px 10px;
            border-radius: 30px;
            width: fit-content;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            margin-top: 6px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #ffffffcc;
            padding: 4px 12px;
            border-radius: 40px;
            transition: all 0.1s ease;
            border: 1px solid #cfe2b0;
            cursor: pointer;
        }

        .option-item:hover {
            background: #d9f0c5;
            transform: scale(1.02);
        }

        input[type="radio"] {
            accent-color: #3f9e4b;
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
        }

        .option-item span {
            font-size: 0.92rem;
            font-weight: 500;
        }

        .crop-selector {
            background: #f5f7e9;
            border-radius: 1.5rem;
            padding: 12px 18px;
            margin-bottom: 20px;
            border-left: 8px solid #ffb347;
        }

        .crop-selector label {
            font-weight: bold;
            font-size: 1.1rem;
            color: #3c6e2f;
            display: block;
            margin-bottom: 8px;
        }

        .double-select {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .double-select .select-item {
            flex: 1;
            min-width: 140px;
        }

        .double-select select {
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 40px;
            background: white;
            border: 1px solid #7eae5a;
            font-weight: bold;
            cursor: pointer;
            color: #1f4f2d;
            width: 100%;
        }

        .btn-reset, .btn-save-history {
            background: #ece6cf;
            border: 1px solid #88b35c;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #2c613a;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
            transition: 0.2s;
            margin-top: 12px;
        }

        .btn-save-history {
            background: #cfe3b5;
            border-color: #5e8c3a;
        }

        .history-section {
            background: #fefcf0;
            border-radius: 1.5rem;
            padding: 12px 18px;
            margin-top: 20px;
            border-left: 8px solid #ffb347;
        }

        .history-section h4 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #3c6e2f;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 8px;
        }

        .history-item {
            background: #fff7e0;
            padding: 8px 10px;
            margin-bottom: 8px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.8rem;
            border: 1px solid #d9c98e;
        }

        .history-item:hover {
            background: #ffefb5;
            transform: translateX(2px);
        }

        .history-item .time {
            font-weight: bold;
            color: #8a6e2b;
        }

        .clear-history {
            background: #e0cfaa;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 5px;
            width: 100%;
        }

        .compare-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }

        .crop-card {
            flex: 1;
            min-width: 240px;
            background: #fffef7;
            color: #2a572a;
            border-radius: 1.5rem;
            padding: 16px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: 0.1s;
        }

        .crop-card h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #ffcd6b;
            padding-bottom: 8px;
            margin-bottom: 12px;
            font-size: 1.4rem;
        }

        .suitability {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            margin: 8px 0;
            background: #e9f5e0;
        }

        .info-text {
            font-size: 0.85rem;
            margin: 8px 0;
            line-height: 1.4;
        }

        .comparison-note {
            background: #ffecb3;
            color: #4a3a1a;
            padding: 12px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #427e47;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🌾 农业区位因素 · 作物对比分析平台 🌽</h1>
    </div>

    <div class="simulation-panel">
        <!-- 左侧操作区 -->
        <div class="factors-area">
            <!-- 需要对比的作物 -->
            <div class="crop-selector">
                <label>📌 需要对比的作物</label>
                <div class="double-select">
                    <div class="select-item">
                        <select id="cropA">
                            <optgroup label="🌾 粮食作物">
                                <option value="wheat">小麦</option>
                                <option value="rice" selected>水稻</option>
                                <option value="corn">玉米</option>
                                <option value="sorghum">高粱</option>
                                <option value="potato">马铃薯</option>
                            </optgroup>
                            <optgroup label="💰 经济作物">
                                <option value="cotton">棉花</option>
                                <option value="sesame">芝麻</option>
                                <option value="soybean">大豆</option>
                                <option value="peanut">花生</option>
                                <option value="sugarcane">甘蔗</option>
                                <option value="tea">茶树</option>
                            </optgroup>
                            <optgroup label="🐄 饲料与绿肥">
                                <option value="alfalfa">苜蓿</option>
                                <option value="ryegrass">黑麦草</option>
                                <option value="clover">三叶草</option>
                            </optgroup>
                            <optgroup label="🍅 蔬菜与果树">
                                <option value="tomato">番茄</option>
                                <option value="cabbage">大白菜</option>
                                <option value="apple">苹果</option>
                                <option value="citrus">柑橘</option>
                                <option value="grape">葡萄</option>
                            </optgroup>
                            <optgroup label="🌸 花卉与药用">
                                <option value="rose">玫瑰</option>
                                <option value="chrysanthemum">菊花</option>
                                <option value="ginseng">人参</option>
                                <option value="lavender">薰衣草</option>
                            </optgroup>
                        </select>
                        <div style="font-size:0.7rem; text-align:center;">作物 A</div>
                    </div>
                    <div class="select-item">
                        <select id="cropB">
                            <optgroup label="🌾 粮食作物">
                                <option value="wheat" selected>小麦</option>
                                <option value="rice">水稻</option>
                                <option value="corn">玉米</option>
                                <option value="sorghum">高粱</option>
                                <option value="potato">马铃薯</option>
                            </optgroup>
                            <optgroup label="💰 经济作物">
                                <option value="cotton">棉花</option>
                                <option value="sesame">芝麻</option>
                                <option value="soybean">大豆</option>
                                <option value="peanut">花生</option>
                                <option value="sugarcane">甘蔗</option>
                                <option value="tea">茶树</option>
                            </optgroup>
                            <optgroup label="🐄 饲料与绿肥">
                                <option value="alfalfa">苜蓿</option>
                                <option value="ryegrass">黑麦草</option>
                                <option value="clover">三叶草</option>
                            </optgroup>
                            <optgroup label="🍅 蔬菜与果树">
                                <option value="tomato">番茄</option>
                                <option value="cabbage">大白菜</option>
                                <option value="apple">苹果</option>
                                <option value="citrus">柑橘</option>
                                <option value="grape">葡萄</option>
                            </optgroup>
                            <optgroup label="🌸 花卉与药用">
                                <option value="rose">玫瑰</option>
                                <option value="chrysanthemum">菊花</option>
                                <option value="ginseng">人参</option>
                                <option value="lavender">薰衣草</option>
                            </optgroup>
                        </select>
                        <div style="font-size:0.7rem; text-align:center;">作物 B</div>
                    </div>
                </div>
            </div>

            <!-- 自然因素 (气候、地形、水源 + 土壤四细分) -->
            <div class="factor-category">
                <h3>🌿 自然因素</h3>
                <!-- 气候 -->
                <div class="factor-group"><label>气候</label><div class="options" id="climate-group"></div></div>
                <!-- 地形 -->
                <div class="factor-group"><label>地形</label><div class="options" id="terrain-group"></div></div>
                <!-- 水源 -->
                <div class="factor-group"><label>水源</label><div class="options" id="water-group"></div></div>
                <!-- 土壤 - 肥力高低 -->
                <div class="factor-group"><label>土壤 · 肥力高低</label><div class="options" id="soilFertility-group"></div></div>
                <!-- 土壤 - 土壤质地 -->
                <div class="factor-group"><label>土壤 · 土壤质地</label><div class="options" id="soilTexture-group"></div></div>
                <!-- 土壤 - 土层厚度 -->
                <div class="factor-group"><label>土壤 · 土层厚度</label><div class="options" id="soilDepth-group"></div></div>
                <!-- 土壤 - 酸碱度 -->
                <div class="factor-group"><label>土壤 · 酸碱度</label><div class="options" id="soilPH-group"></div></div>
            </div>

            <button type="button" class="btn-reset" id="resetBtn">🔄 重置自然因素为默认值</button>
            <button type="button" class="btn-save-history" id="saveHistoryBtn">📋 保存当前评估记录</button>

            <!-- 历史评估记录 -->
            <div class="history-section">
                <h4>📜 历史评估记录</h4>
                <div id="historyList" class="history-list">
                    <div style="color:#888; text-align:center; padding:8px;">暂无历史记录</div>
                </div>
                <button id="clearHistoryBtn" class="clear-history">🗑 清空所有记录</button>
            </div>
        </div>

        <!-- 右侧结果区：双作物对比展示 -->
        <div class="result-area" id="resultArea">
            <div class="compare-container" id="compareContainer"></div>
            <div class="comparison-note" id="comparisonNote">
                ⚡ 选择两种作物并调整自然因素，系统将自动对比分析
            </div>
        </div>
    </div>
    <footer>🌍 地理教学 · 基于自然区位因素模型（气候、地形、水源、土壤四维度）| 支持双作物对比及历史记录</footer>
</div>

<script>
    // ======================= 作物完整数据库（含水源和土壤四维理想值）=======================
    const CROP_DB = {
        // 粮食作物

        cabbage: { name: "大白菜", icon: "🥬", habit: "喜冷凉湿润，需疏松肥沃土壤，充足水分。", distribution: "中国、韩国、日本。中国北方主产区。", ideal: { climate: "温带", terrain: "平原", water: "水源充足", soilFertility: "肥沃", soilTexture: "壤土", soilDepth: "中等", soilPH: "中性" } },
        apple: { name: "苹果", icon: "🍎", habit: "喜冷凉干燥，适宜土层深厚、排水良好的壤土。", distribution: "中国、美国、波兰、土耳其。中国主产山东、陕西、甘肃。", ideal: { climate: "温带", terrain: "丘陵", water: "水源中等", soilFertility: "中等", soilTexture: "壤土", soilDepth: "深厚", soilPH: "中性" } },
        citrus: { name: "柑橘", icon: "🍊", habit: "喜温暖湿润，适宜微酸性土壤。", distribution: "巴西、中国、美国、墨西哥。中国主产长江以南。", ideal: { climate: "亚热带", terrain: "丘陵", water: "水源中等", soilFertility: "中等", soilTexture: "壤土", soilDepth: "中等", soilPH: "微酸性" } },
        grape: { name: "葡萄", icon: "🍇", habit: "喜光、耐旱，适宜疏松排水好的沙壤土。", distribution: "中国、意大利、法国、美国。中国主产新疆、河北、山东。", ideal: { climate: "温带", terrain: "丘陵", water: "水源缺乏", soilFertility: "中等", soilTexture: "砂土", soilDepth: "中等", soilPH: "中性" } },
        // 花卉与药用
        rose: { name: "玫瑰", icon: "🌹", habit: "喜光、耐寒耐旱，适宜肥沃疏松、排水良好的微酸性土壤。", distribution: "全球广泛栽培，中国主产山东、甘肃、云南。", ideal: { climate: "温带", terrain: "平原", water: "水源中等", soilFertility: "肥沃", soilTexture: "壤土", soilDepth: "深厚", soilPH: "微酸性" } },
        chrysanthemum: { name: "菊花", icon: "🌸", habit: "喜凉爽，耐寒，适宜肥沃疏松、排水良好土壤。", distribution: "中国、日本、荷兰。中国主产浙江、江苏、河南。", ideal: { climate: "温带", terrain: "平原", water: "水源中等", soilFertility: "肥沃", soilTexture: "壤土", soilDepth: "中等", soilPH: "中性" } },
        ginseng: { name: "人参", icon: "🌿", habit: "喜冷凉湿润，耐阴，需腐殖质深厚、排水良好的微酸性土壤。", distribution: "中国东北、韩国、俄罗斯远东。", ideal: { climate: "寒带/高山", terrain: "山地", water: "水源中等", soilFertility: "肥沃", soilTexture: "壤土", soilDepth: "深厚", soilPH: "微酸性" } },
        lavender: { name: "薰衣草", icon: "🌸", habit: "喜光、耐旱，适宜疏松排水良好的沙质土壤。", distribution: "法国、保加利亚、中国新疆。", ideal: { climate: "温带", terrain: "丘陵", water: "水源缺乏", soilFertility: "中等", soilTexture: "砂土", soilDepth: "中等", soilPH: "中性" } }
    };

    // 自然因素配置（包含水源）
    const NATURAL_FACTORS = {
        climate: { label: "气候", options: ["热带", "亚热带", "温带", "寒带/高山"] },
        terrain: { label: "地形", options: ["平原", "丘陵", "山地"] },
        water: { label: "水源", options: ["水源充足", "水源中等", "水源缺乏"] },
        soilFertility: { label: "土壤 · 肥力高低", options: ["肥沃", "中等", "贫瘠"] },
        soilTexture: { label: "土壤 · 土壤质地", options: ["砂土", "壤土", "黏土"] },
        soilDepth: { label: "土壤 · 土层厚度", options: ["深厚", "中等", "浅薄"] },
        soilPH: { label: "土壤 · 酸碱度", options: ["酸性", "微酸性", "中性", "碱性"] }
    };

    // 默认自然因素值
    let currentSelections = {
        climate: "亚热带",
        terrain: "平原",
        water: "水源充足",
        soilFertility: "肥沃",
        soilTexture: "壤土",
        soilDepth: "深厚",
        soilPH: "中性"
    };

    // 渲染所有自然因素单选按钮组
    function renderNaturalOptions() {
        for (const [factorKey, config] of Object.entries(NATURAL_FACTORS)) {
            const container = document.getElementById(`${factorKey}-group`);
            if (!container) continue;
            container.innerHTML = "";
            config.options.forEach(opt => {
                const isChecked = (currentSelections[factorKey] === opt);
                const div = document.createElement("div");
                div.className = "option-item";
                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = factorKey;
                radio.value = opt;
                radio.id = `${factorKey}_${opt.replace(/\s/g, '_')}`;
                radio.checked = isChecked;
                const span = document.createElement("span");
                span.innerText = opt;
                div.appendChild(radio);
                div.appendChild(span);
                container.appendChild(div);
            });
        }
    }

    function collectSelections() {
        const sel = {};
        for (const key of Object.keys(NATURAL_FACTORS)) {
            const checked = document.querySelector(`input[name="${key}"]:checked`);
            sel[key] = checked ? checked.value : currentSelections[key];
        }
        return sel;
    }

    // 计算作物适宜性（气候、地形、水源、土壤四维度，共7个因素，每个10分，满分70）
    function calculateSuitability(ideal, actual) {
        let total = 0;
        let max = 0;
        const factors = ["climate", "terrain", "water", "soilFertility", "soilTexture", "soilDepth", "soilPH"];
        for (const factor of factors) {
            max += 10;
            if (ideal[factor] === actual[factor]) {
                total += 10;
            } else {
                let partial = 0;
                if (factor === "soilPH") {
                    if ((ideal[factor] === "微酸性" && (actual[factor] === "酸性" || actual[factor] === "中性")) ||
                        (ideal[factor] === "酸性" && actual[factor] === "微酸性") ||
                        (ideal[factor] === "中性" && actual[factor] === "微酸性")) partial = 7;
                    else partial = 0;
                } else if (factor === "soilFertility" && ((ideal[factor]==="肥沃" && actual[factor]==="中等") || (ideal[factor]==="中等" && actual[factor]==="肥沃"))) partial = 7;
                else if (factor === "soilTexture" && ((ideal[factor]==="壤土" && actual[factor]==="砂土") || (ideal[factor]==="砂土" && actual[factor]==="壤土"))) partial = 6;
                else if (factor === "soilDepth" && ((ideal[factor]==="深厚" && actual[factor]==="中等") || (ideal[factor]==="中等" && actual[factor]==="深厚"))) partial = 7;
                else if (factor === "climate" && ((ideal[factor]==="温带" && actual[factor]==="亚热带") || (ideal[factor]==="亚热带" && actual[factor]==="温带"))) partial = 7;
                else if (factor === "water" && ((ideal[factor]==="水源充足" && actual[factor]==="水源中等") || (ideal[factor]==="水源中等" && actual[factor]==="水源充足"))) partial = 7;
                else partial = 0;
                total += partial;
            }
        }
        const percent = Math.round((total / max) * 100);
        let level = "";
        if (percent >= 70) level = "高适宜性 🌟🌟🌟";
        else if (percent >= 45) level = "中等适宜性 🌟🌟";
        else level = "低适宜性 🌟";
        return { percent, level };
    }

    // 生成单个作物卡片
    function createCropCard(cropId, actualFactors, sideLabel) {
        const crop = CROP_DB[cropId];
        if (!crop) return null;
        const suitability = calculateSuitability(crop.ideal, actualFactors);
        let suggestion = "";
        if (suitability.percent >= 70) suggestion = "✅ 非常适宜，可优先选择";
        else if (suitability.percent >= 45) suggestion = "⚖️ 基本适宜，部分条件可优化";
        else suggestion = "⚠️ 不太适宜，建议调整区位或换种";
        
        // 显示理想土壤组合
        const idealSoil = `肥力:${crop.ideal.soilFertility} · 质地:${crop.ideal.soilTexture} · 厚度:${crop.ideal.soilDepth} · pH:${crop.ideal.soilPH}`;
        return `
            <div class="crop-card">
                <h3>${crop.icon} ${crop.name} <span style="font-size:0.8rem;">${sideLabel}</span></h3>
                <div class="suitability" style="background:#e9f5e0;">
                    🌟 适宜性: ${suitability.level} (匹配度 ${suitability.percent}%)
                </div>
                <div class="info-text"><strong>📖 习性：</strong><br>${crop.habit}</div>
                <div class="info-text"><strong>🌍 主要分布：</strong><br>${crop.distribution}</div>
                <div class="info-text"><strong>🎯 理想自然组合：</strong><br>气候:${crop.ideal.climate} · 地形:${crop.ideal.terrain} · 水源:${crop.ideal.water}<br>${idealSoil}</div>
                <div class="info-text" style="margin-top:8px; background:#f0f4e8; padding:6px; border-radius:12px;">
                    💡 ${suggestion}
                </div>
            </div>
        `;
    }

    // 生成对比结论
    function getComparisonConclusion(cropAId, cropBId, actualFactors) {
        const cropA = CROP_DB[cropAId];
        const cropB = CROP_DB[cropBId];
        if (!cropA || !cropB) return "无法获取作物信息";
        const suitA = calculateSuitability(cropA.ideal, actualFactors);
        const suitB = calculateSuitability(cropB.ideal, actualFactors);
        if (suitA.percent > suitB.percent) {
            return `🏆 对比结论：在当前自然区位条件下，<strong>${cropA.name}</strong> 的适宜性 (${suitA.percent}%) 高于 <strong>${cropB.name}</strong> (${suitB.percent}%)，更适合在此地种植。建议结合市场需求综合决策。`;
        } else if (suitB.percent > suitA.percent) {
            return `🏆 对比结论：在当前自然区位条件下，<strong>${cropB.name}</strong> 的适宜性 (${suitB.percent}%) 高于 <strong>${cropA.name}</strong> (${suitA.percent}%)，更适合在此地种植。建议结合市场需求综合决策。`;
        } else {
            return `⚖️ 对比结论：两种作物在当前自然区位条件下的适宜性相当 (匹配度均为 ${suitA.percent}%)，可依据市场、劳动力等社会经济因素进一步选择。`;
        }
    }

    // 更新整个对比区域
    function updateCompareDisplay() {
        const selections = collectSelections();
        for (let [k, v] of Object.entries(selections)) currentSelections[k] = v;
        
        const cropAId = document.getElementById("cropA").value;
        const cropBId = document.getElementById("cropB").value;
        
        const cardA = createCropCard(cropAId, selections, "(作物 A)");
        const cardB = createCropCard(cropBId, selections, "(作物 B)");
        
        const compareContainer = document.getElementById("compareContainer");
        if (cardA && cardB) {
            compareContainer.innerHTML = `<div style="display:flex; flex-wrap:wrap; gap:20px; width:100%;">${cardA}${cardB}</div>`;
        } else {
            compareContainer.innerHTML = `<div class="crop-card">无法加载作物数据</div>`;
        }
        
        const conclusion = getComparisonConclusion(cropAId, cropBId, selections);
        const noteDiv = document.getElementById("comparisonNote");
        noteDiv.innerHTML = `
            <strong>📊 对比分析结论</strong><br>
            ${conclusion}<br>
            <span style="font-size:0.8rem;">🌱 当前自然因素组合：气候:${selections.climate} · 地形:${selections.terrain} · 水源:${selections.water} · 肥力:${selections.soilFertility} · 质地:${selections.soilTexture} · 厚度:${selections.soilDepth} · pH:${selections.soilPH}</span>
        `;
    }

    // ========== 历史记录管理 ==========
    function getHistory() {
        const stored = localStorage.getItem("agri_compare_history_v3");
        if (!stored) return [];
        try {
            return JSON.parse(stored);
        } catch(e) { return []; }
    }

    function saveHistory(record) {
        let history = getHistory();
        history.unshift(record);
        if (history.length > 20) history = history.slice(0,20);
        localStorage.setItem("agri_compare_history_v3", JSON.stringify(history));
        renderHistoryList();
    }

    function clearHistory() {
        localStorage.removeItem("agri_compare_history_v3");
        renderHistoryList();
    }

    function renderHistoryList() {
        const history = getHistory();
        const container = document.getElementById("historyList");
        if (!container) return;
        if (history.length === 0) {
            container.innerHTML = '<div style="color:#888; text-align:center; padding:8px;">暂无历史记录</div>';
            return;
        }
        container.innerHTML = "";
        history.forEach((item, idx) => {
            const div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `
                <div class="time">📅 ${item.time}</div>
                <div><strong>${item.cropAName}</strong> vs <strong>${item.cropBName}</strong></div>
                <div>🌿 匹配度: ${item.suitA}% / ${item.suitB}%</div>
                <div style="font-size:0.7rem;">${item.summary}</div>
            `;
            div.addEventListener("click", () => loadHistoryRecord(item));
            container.appendChild(div);
        });
    }

    function loadHistoryRecord(record) {
        document.getElementById("cropA").value = record.cropA;
        document.getElementById("cropB").value = record.cropB;
        if (record.natural) {
            for (const [factor, val] of Object.entries(record.natural)) {
                const radio = document.querySelector(`input[name="${factor}"][value="${val}"]`);
                if (radio) radio.checked = true;
            }
            currentSelections = { ...record.natural };
        }
        updateCompareDisplay();
    }

    function saveCurrentEvaluation() {
        const selections = collectSelections();
        const cropAId = document.getElementById("cropA").value;
        const cropBId = document.getElementById("cropB").value;
        const cropA = CROP_DB[cropAId];
        const cropB = CROP_DB[cropBId];
        if (!cropA || !cropB) return;
        const suitA = calculateSuitability(cropA.ideal, selections);
        const suitB = calculateSuitability(cropB.ideal, selections);
        const summary = suitA.percent > suitB.percent ? `${cropA.name}更适宜` : (suitB.percent > suitA.percent ? `${cropB.name}更适宜` : "两者适宜性相当");
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const record = {
            time: timeStr,
            cropA: cropAId,
            cropB: cropBId,
            cropAName: cropA.name,
            cropBName: cropB.name,
            suitA: suitA.percent,
            suitB: suitB.percent,
            summary: summary,
            natural: { ...selections }
        };
        saveHistory(record);
        alert("已保存当前评估记录！");
    }

    function resetNatural() {
        currentSelections = {
            climate: "亚热带",
            terrain: "平原",
            water: "水源充足",
            soilFertility: "肥沃",
            soilTexture: "壤土",
            soilDepth: "深厚",
            soilPH: "中性"
        };
        renderNaturalOptions();
        updateCompareDisplay();
    }

    // 初始化
    document.addEventListener("DOMContentLoaded", () => {
        renderNaturalOptions();
        updateCompareDisplay();
        renderHistoryList();
        
        document.getElementById("resetBtn").addEventListener("click", resetNatural);
        document.getElementById("saveHistoryBtn").addEventListener("click", saveCurrentEvaluation);
        document.getElementById("clearHistoryBtn").addEventListener("click", () => {
            if (confirm("确定清空所有历史记录吗？")) clearHistory();
        });
        document.getElementById("cropA").addEventListener("change", updateCompareDisplay);
        document.getElementById("cropB").addEventListener("change", updateCompareDisplay);
        
        const attachAuto = () => {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.removeEventListener('change', updateCompareDisplay);
                radio.addEventListener('change', updateCompareDisplay);
            });
        };
        attachAuto();
        const observer = new MutationObserver(() => attachAuto());
        observer.observe(document.getElementById("climate-group").parentNode.parentNode, { childList: true, subtree: true });
    });
</script>
